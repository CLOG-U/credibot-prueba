services:
  - type: web
    name: creditbot
    runtime: python
    rootDir: creditbot
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_PUBLIC_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: TWILIO_VALIDATE_SIGNATURE
        value: "true"
      - key: DEFAULT_COUNTRY_CODE
        value: "593"
      - key: ENABLE_GPT_AGENT
        value: "true"
      - key: LLM_PROVIDER
        value: "openai"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: "gpt-4o-mini"
      - key: OPENAI_MAX_TOKENS
        value: "500"
      - key: OPENAI_TIMEOUT_SECONDS
        value: "30"
      - key: OPENAI_MAX_ITERATIONS
        value: "3"

  - type: web
    name: creditbot-dashboard
    runtime: python
    rootDir: creditbot
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run dashboard/app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true --browser.gatherUsageStats=false
    healthCheckPath: /_stcore/health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_DASHBOARD_PASSWORD
        sync: false
      - key: CREDIBOT_API_URL
        sync: false
