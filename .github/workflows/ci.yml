name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: creditbot

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Lint con ruff
        run: ruff check app --ignore E501

      - name: Ejecutar tests
        env:
          LLM_PROVIDER: mock
          ENABLE_GPT_AGENT: false
        run: pytest app/tests -q

      - name: Construir imagen Docker
        run: docker build -f infra/Dockerfile -t credibot:ci .
